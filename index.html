<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tecmaster</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,600;0,800;1,300;1,600;1,800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #E8E8E8;
            --bg-grad: linear-gradient(180deg, #E8E8E8 0%, #C3C3C3 100%);
            --accent: #FFBE00;
            --btn-black: linear-gradient(180deg, #1C1C1A 0%, #000000 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            /* Запрет горизонтального переполнения на каждом элементе */
            max-width: 100%;
        }

        html, body {
            /* Жёстко фиксируем ширину — никакого 100vw */
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            /* iOS Safari: отключаем bounce по горизонтали */
            overscroll-behavior-x: none;
            -webkit-overflow-scrolling: touch;
        }

        body {
            background: var(--bg-grad);
            /* fixed не работает корректно в iOS TMA — заменяем на scroll */
            background-attachment: scroll;
            font-family: 'Montserrat', sans-serif;
            /* Дополнительная защита от горизонтального выхода */
            position: relative;
        }

        .app-wrapper {
            width: 100%;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            background: transparent;
            position: relative;
            /* Три уровня защиты от горизонтального переполнения */
            overflow: hidden;
        }

        /* Шапка */
        .header-image {
            width: 100%;
            display: block;
            object-fit: cover;
            flex-shrink: 0;
        }

        /* Контентная область */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            padding: 0 31px;
            margin-top: -5%;
            z-index: 2;
        }

        /* Внутренний ограничитель */
        .content-inner {
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        /* Hero секция */
        .hero {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 32px;
            flex-wrap: nowrap;
            gap: 8px;
            /* Не даём блоку растянуться шире родителя */
            overflow: hidden;
        }

        .hero-text {
            /* flex: 1 + min-width: 0 — ключевой приём для iOS flex overflow */
            flex: 1 1 0;
            min-width: 0;
        }

        .title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            /* clamp: минимум чтобы влезло на узком экране, максимум 48px как в Figma */
            font-size: clamp(36px, 11vw, 48px);
            line-height: 1;
            text-transform: uppercase;
            background: linear-gradient(180deg, #000000 0%, #666666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap; /* каждая строка строго в одну */
        }

        .subtitle {
            margin-top: 12px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: 13px;
            line-height: 1.4;
            max-width: 197px;
            color: #000000;
            word-wrap: break-word;
        }

        .hero-img {
            flex: 0 0 auto;
            width: clamp(120px, 36%, 175px);
            height: auto;
            border-radius: 20px;
            object-fit: cover;
            /* Картинка не растягивает родителя */
            display: block;
        }

        /* Кнопки */
        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .action-btn {
            /* width: 100% без лишних отступов */
            width: 100%;
            height: 70px;
            background: linear-gradient(180deg, #1C1C1A 0%, #000000 100%);
            border-radius: 25px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 21px;
            padding-right: 0;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 0 20px 4px rgba(0,0,0,0.25);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            /* Убираем системные стили iOS */
            -webkit-appearance: none;
            appearance: none;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 24px 4px rgba(0,0,0,0.32);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        .btn-label {
            font-family: 'Montserrat', sans-serif;
            color: #FFFFFF;
            font-weight: 600;
            font-size: 20px;
            text-align: left;
            line-height: 1.2;
            /* Текст не выходит за кнопку */
            flex: 1 1 0;
            min-width: 0;
        }

        .btn-icon-box {
            width: 104px;
            height: 70px;
            background: linear-gradient(180deg, #FFD250 0%, #FFC20F 100%);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-icon-box img {
            width: 26px;
            height: 26px;
        }

        /* Футер */
        .footer {
            padding: 28px 20px;
            padding-bottom: calc(28px + env(safe-area-inset-bottom));
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo {
            width: 120px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <img src="assets/images/upbar.png" class="header-image" alt="">

    <div class="content">
        <div class="content-inner">
            <div class="hero">
                <div class="hero-text">
                    <div class="title">ОТДЕЛ<br>ЗАБОТЫ</div>
                    <p class="subtitle">Электрические распылители для красок, эмалей и пропиток.</p>
                </div>
                <img src="assets/images/tecmasterimage_1.png" class="hero-img" alt="">
            </div>

            <div class="btn-list">
                <button class="action-btn" onclick="openPage('pages/check.html')">
                    <span class="btn-label">Беспроигрышная<br>лотерея</span>
                    <div class="btn-icon-box">
                        <img src="assets/images/button_image.png" alt="">
                    </div>
                </button>

                <button class="action-btn" onclick="openSupport()">
                    <span class="btn-label">С покупкой<br>что-то не так</span>
                    <div class="btn-icon-box">
                        <img src="assets/images/button_image.png" alt="">
                    </div>
                </button>
            </div>
        </div>
    </div>

    <div class="footer">
        <img src="assets/images/spraystorelogo.png" class="logo" alt="">
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#E8E8E8');
    tg.setBackgroundColor('#E8E8E8');

    if (tg.isVersionAtLeast('7.7')) {
        tg.disableVerticalSwiping();
    }

    function openPage(url) {
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        window.location.href = url;
    }

    function openSupport() {
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        // tg.openTelegramLink('...');
    }
</script>

</body>
</html>
