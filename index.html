<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tecmaster - Главное меню</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: linear-gradient(180deg, #E8E8E8 0%, #C3C3C3 100%);
            --text-grad: linear-gradient(180deg, #000000 0%, #666666 100%);
            --btn-grad: linear-gradient(180deg, #000000 0%, #1C1C1A 100%);
            /* ЗАМЕНА ГРАДИЕНТА НА FLAT ЦВЕТ */
            --accent-color: #FFBE00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            line-height: 100%;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #E8E8E8;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        .main-container {
            width: 422px;
            height: 100vh;
            background: var(--bg-main);
            position: relative;
            flex-shrink: 0;
        }

        /* Декор сверху (upbar.png) */
        .upbar {
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 10;
        }

        /* Заголовок (ОТДЕЛ ЗАБОТЫ) */
        .title-block {
            position: absolute;
            top: 85px;
            left: 31px;
            z-index: 20;
        }

        .title-line {
            font-weight: 800;
            font-size: 48px;
            text-transform: uppercase;
            background: var(--text-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: -5px;
        }

        /* Описание */
        .desc-text {
            position: absolute;
            width: 197px;
            top: 191px;
            left: 31px;
            font-weight: 300;
            font-size: 13px;
            color: #000000;
            line-height: 1.2;
            z-index: 20;
        }

        /* Фото товара (tecmasterimage_1) */
        .product-img {
            position: absolute;
            width: 143px;
            height: 215px;
            top: 84px;
            right: 31px;
            border-radius: 25px;
            object-fit: cover;
            z-index: 15;
        }

        /* Контейнер кнопок */
        .menu-buttons {
            position: absolute;
            top: 319px;
            left: 31px;
            display: flex;
            flex-direction: column;
            gap: 21px; /* Расстояние между кнопками */
            z-index: 30;
        }

        /* Большая кнопка */
        .big-btn {
            width: 360px;
            height: 70px;
            background: var(--btn-grad);
            border-radius: 25px;
            position: relative;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            box-shadow: 0px 0px 20px 4px rgba(0, 0, 0, 0.25);
            transition: 0.1s;
        }

        .big-btn:active {
            transform: scale(0.98);
        }

        /* Небольшой эффект при наведении, т.к. цвет flat */
        .big-btn:hover {
            filter: brightness(0.95);
        }

        /* Текст на кнопке */
        .big-btn-text {
            color: #FFFFFF;
            font-weight: 600;
            font-size: 20px;
            margin-left: 21px;
            text-align: left;
        }

        /* Желтая вставка внутри кнопки */
        .btn-yellow-accent {
            position: absolute;
            right: 0;
            top: 0;
            width: 104px;
            height: 100%;
            /* ИСПОЛЬЗУЕМ FLAT ЦВЕТ */
            background-color: var(--accent-color);
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Иконка стрелки (button_image) */
        .arrow-icon {
            width: 25px;
            height: 25px;
        }

        .bottom-logo {
            position: absolute;
            width: 104px;
            bottom: 40px;
            left: 159px;
        }
    </style>
</head>
<body>

    <main class="main-container">
        <img src="upbar.png" class="upbar">

        <div class="title-block">
            <div class="title-line">ОТДЕЛ</div>
            <div class="title-line">ЗАБОТЫ</div>
        </div>

        <p class="desc-text">
            Многофункциональные электрические распылители для интерьерных красок, эмалей, пропиток для дерева и других материалов.
        </p>

        <img src="tecmasterimage_1.png" class="product-img">

        <div class="menu-buttons">
            <button class="big-btn" id="lottery-btn">
                <span class="big-btn-text">Беспроигрышная<br>лотерея</span>
                <div class="btn-yellow-accent">
                    <img src="button_image.png" class="arrow-icon">
                </div>
            </button>

            <button class="big-btn" id="support-link">
                <span class="big-btn-text">С покупкой<br>что-то не так</span>
                <div class="btn-yellow-accent">
                    <img src="button_image.png" class="arrow-icon">
                </div>
            </button>
        </div>

        <img src="spraystorelogo.png" class="bottom-logo">
    </main>

    <script>
        const tg = window.Telegram.WebApp;
        
        try {
            tg.ready();
            tg.expand();
            if (tg.isVersionAtLeast && tg.isVersionAtLeast('7.7')) {
                tg.disableVerticalSwiping();
            }
            tg.setHeaderColor('#E8E8E8');
            tg.setBackgroundColor('#E8E8E8');
        } catch (e) {
            console.warn("Telegram WebApp API не найдено");
        }

        const lotteryButton = document.getElementById('lottery-btn');
        if (lotteryButton) {
            lotteryButton.onclick = function() {
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('medium');
                }
                // Ведет на ПЕРВУЮ страницу воронки проверки
                window.location.href = 'check.html';
            };
        }

        const supportButton = document.getElementById('support-link');
        if (supportButton) {
            supportButton.onclick = function() {
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('medium');
                }
                // Можно добавить логику перехода в чат поддержки
                // tg.openTelegramLink('https://t.me/tecmaster_support');
            };
        }
    </script>
</body>
</html>
