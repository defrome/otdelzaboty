<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tecmaster</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,600;0,800;1,300;1,600;1,800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #E8E8E8;
            --bg-grad: linear-gradient(180deg, #E8E8E8 0%, #C3C3C3 100%);
            --accent: #FFBE00;
            --btn-black: linear-gradient(180deg, #1C1C1A 0%, #000000 100%);
        }

        /* Полный сброс */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            width: 100%;
            min-height: 100%;
            /* Градиент фиксируем по viewport — никаких белых полос при растягивании */
            background: var(--bg-grad);
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .app-wrapper {
            width: 100%;
            max-width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: transparent;
            position: relative;
            overflow-x: hidden;
        }

        /* Шапка — растягивается на всю ширину */
        .header-image {
            width: 100%;
            display: block;
            object-fit: cover;
            flex-shrink: 0;
        }

        /* Контентная область */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            /* left: 31px из Figma → padding 31px с обеих сторон */
            padding: 0 31px;
            margin-top: -5%;
            z-index: 2;
        }

        /* Внутренний ограничитель: макет Figma 390px, контент до правого края ~360px */
        .content-inner {
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        /* Секция с товаром и текстом */
        .hero {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            /* subtitle top=191px, title top=85px → gap между hero и кнопками = 319-191-96=32px */
            margin-bottom: 32px;
            flex-wrap: nowrap;
            gap: 8px;
        }

        .hero-text {
            /* title top=85px — отступ от шапки обеспечивает margin-top content */
            padding-top: 0;
            flex: 1 1 auto;
        }

        .title {
            font-weight: 800;
            /* Figma: 48px, line-height 100% */
            font-size: 48px;
            line-height: 1;
            text-transform: uppercase;
            background: linear-gradient(180deg, #000000 0%, #666666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            /* Figma: top=191px, title top=85px+59px*2=203px → margin-top ≈ 0, но визуально ~12px */
            margin-top: 12px;
            font-weight: 300;
            /* Figma: 13px, line-height 100% */
            font-size: 13px;
            line-height: 1;
            max-width: 197px;
            color: #000000;
        }

        .hero-img {
            flex: 0 0 auto;
            width: clamp(130px, 36%, 180px);
            height: auto;
            border-radius: 20px;
            object-fit: cover;
        }

        /* Кнопки */
        .btn-list {
            display: flex;
            flex-direction: column;
            /* Figma: две кнопки — между ними ~11px (top2=397 - top1=319 - height=70 = 8px, округлим до 10) */
            gap: 10px;
            width: 100%;
        }

        .action-btn {
            width: 100%;
            /* Figma Rectangle 3: height=70px */
            height: 70px;
            /* Figma: gradient #1C1C1A → #000000 */
            background: linear-gradient(180deg, #1C1C1A 0%, #000000 100%);
            /* Figma: radius=25px */
            border-radius: 25px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            /* Figma: текст left=52px, кнопка left=31px → padding-left=21px */
            padding-left: 21px;
            /* Нет padding-right — жёлтый блок вровень с правым краем */
            padding-right: 0;
            overflow: hidden; /* жёлтый блок обрезается радиусом кнопки */
            cursor: pointer;
            /* Figma: drop shadow x=0 y=0 blur=20 spread=4 #000 25% */
            box-shadow: 0 0 20px 4px rgba(0,0,0,0.25);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 24px 4px rgba(0,0,0,0.32);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        .btn-label {
            font-family: 'Montserrat', sans-serif;
            color: #FFFFFF;
            font-weight: 600;
            font-size: 20px;
            text-align: left;
            line-height: 1.2;
        }

        .btn-icon-box {
            /* Figma Rectangle 5: width=104px height=70px radius=25px
               height совпадает с кнопкой → покрывает полностью по высоте
               border-radius только слева, правый край обрезает overflow:hidden родителя */
            width: 104px;
            height: 70px;
            /* Figma: gradient #FFD250 → #FFC20F */
            background: linear-gradient(180deg, #FFD250 0%, #FFC20F 100%);
            border-radius: 25px 25px 25px 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-icon-box img {
            width: 26px;
            height: 26px;
        }

        /* Футер */
        .footer {
            padding: 28px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: calc(28px + env(safe-area-inset-bottom));
        }

        .logo {
            width: 120px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <img src="assets/images/upbar.png" class="header-image" alt="">

    <div class="content">
        <div class="content-inner">
            <div class="hero">
                <div class="hero-text">
                    <div class="title">ОТДЕЛ<br>ЗАБОТЫ</div>
                    <p class="subtitle">Электрические распылители для красок, эмалей и пропиток.</p>
                </div>
                <img src="assets/images/tecmasterimage_1.png" class="hero-img" alt="">
            </div>

            <div class="btn-list">
                <button class="action-btn" onclick="openPage('pages/check.html')">
                    <span class="btn-label">Беспроигрышная<br>лотерея</span>
                    <div class="btn-icon-box">
                        <img src="assets/images/button_image.png" alt="">
                    </div>
                </button>

                <button class="action-btn" onclick="openSupport()">
                    <span class="btn-label">С покупкой<br>что-то не так</span>
                    <div class="btn-icon-box">
                        <img src="assets/images/button_image.png" alt="">
                    </div>
                </button>
            </div>
        </div>
    </div>

    <div class="footer">
        <img src="assets/images/spraystorelogo.png" class="logo" alt="">
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#E8E8E8');
    tg.setBackgroundColor('#E8E8E8');
    

    if (tg.isVersionAtLeast('7.7')) {
        tg.disableVerticalSwiping();
    }

    function openPage(url) {
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        window.location.href = url;
    }

    function openSupport() {
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        // tg.openTelegramLink('...');
    }
</script>

</body>
</html>
