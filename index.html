<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tecmaster - Главное меню</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: linear-gradient(180deg, #E8E8E8 0%, #C3C3C3 100%);
            --text-grad: linear-gradient(180deg, #000000 0%, #666666 100%);
            --btn-grad: linear-gradient(180deg, #000000 0%, #1C1C1A 100%);
            --accent-color: #FFBE00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            line-height: 1.2;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #E8E8E8;
            font-family: 'Montserrat', sans-serif;
        }

        /* Основной скролл-контейнер */
        .main-container {
            width: 100%;
            max-width: 422px;
            min-height: 100vh;
            background: var(--bg-main);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding-bottom: 30px; /* Отступ под логотипом */
            overflow-x: hidden;
        }

        /* Декор сверху */
        .upbar {
            width: 100%;
            height: auto;
            flex-shrink: 0;
        }

        /* Контентная часть (Заголовок + Описание + Фото) */
        .hero-section {
            width: 100%;
            padding: 20px 31px;
            display: grid;
            grid-template-columns: 1fr 143px; /* Текст слева, фото справа */
            gap: 15px;
            margin-top: -20px; /* Немного заходим под upbar для красоты */
        }

        .title-line {
            font-weight: 800;
            font-size: clamp(32px, 10vw, 48px);
            text-transform: uppercase;
            background: var(--text-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
        }

        .desc-text {
            grid-column: 1 / 2;
            font-weight: 300;
            font-size: 13px;
            color: #000000;
            margin-top: 15px;
            max-width: 200px;
        }

        .product-img {
            width: 143px;
            height: 215px;
            border-radius: 25px;
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Контейнер кнопок */
        .menu-buttons {
            width: 100%;
            padding: 30px 31px;
            display: flex;
            flex-direction: column;
            gap: 21px;
        }

        .big-btn {
            width: 100%;
            max-width: 360px;
            height: 70px;
            background: var(--btn-grad);
            border-radius: 25px;
            position: relative;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s;
            overflow: hidden; /* Чтобы желтая вставка не вылезала */
        }

        .big-btn:active { transform: scale(0.98); }

        .big-btn-text {
            color: #FFFFFF;
            font-weight: 600;
            font-size: 18px;
            margin-left: 21px;
            text-align: left;
            z-index: 2;
        }

        .btn-yellow-accent {
            position: absolute;
            right: 0;
            top: 0;
            width: 80px; /* Чуть уменьшил для адаптивности */
            height: 100%;
            background-color: var(--accent-color);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
        }

        .arrow-icon {
            width: 20px;
            height: 20px;
        }

        /* Прослойка, выталкивающая лого вниз */
        .spacer {
            flex-grow: 1;
            min-height: 40px;
        }

        .bottom-logo {
            width: 104px;
            height: auto;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <main class="main-container">
        <img src="assets/images/upbar.png" class="upbar">

        <section class="hero-section">
            <div class="text-side">
                <span class="title-line">ОТДЕЛ</span>
                <span class="title-line">ЗАБОТЫ</span>
                <p class="desc-text">
                    Многофункциональные электрические распылители для интерьерных красок, эмалей, пропиток для дерева и других материалов.
                </p>
            </div>
            <img src="assets/images/tecmasterimage_1.png" class="product-img">
        </section>

        <div class="menu-buttons">
            <button class="big-btn" id="lottery-btn">
                <span class="big-btn-text">Беспроигрышная<br>лотерея</span>
                <div class="btn-yellow-accent">
                    <img src="assets/images/button_image.png" class="arrow-icon">
                </div>
            </button>

            <button class="big-btn" id="support-link">
                <span class="big-btn-text">С покупкой<br>что-то не так</span>
                <div class="btn-yellow-accent">
                    <img src="assets/images/button_image.png" class="arrow-icon">
                </div>
            </button>
        </div>

        <div class="spacer"></div>

        <img src="assets/images/spraystorelogo.png" class="bottom-logo">
    </main>

    <script>
        const tg = window.Telegram.WebApp;
        
        try {
            tg.ready();
            tg.expand();
            if (tg.isVersionAtLeast && tg.isVersionAtLeast('7.7')) {
                tg.disableVerticalSwiping();
            }
            tg.setHeaderColor('#E8E8E8');
            tg.setBackgroundColor('#E8E8E8');
        } catch (e) {
            console.warn("Telegram WebApp API не найдено");
        }

        document.getElementById('lottery-btn').onclick = function() {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            window.location.href = 'pages/check.html';
        };

        document.getElementById('support-link').onclick = function() {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            // tg.openTelegramLink('https://t.me/your_bot_support'); 
        };
    </script>
</body>
</html>
