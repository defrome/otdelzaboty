<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Шаг 4 - Фото товара</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent-yellow: #FFBE00; 
            --black-grad: linear-gradient(180deg, #000000 0%, #1C1C1A 100%); 
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body, html { 
            width: 100%; 
            height: 100%; 
            background: #FFFFFF; 
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden;
        }

        .container { 
            width: 100%; 
            max-width: 500px;
            height: 100vh; 
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        .main-title { 
            margin-top: 10px;
            font-weight: 800; 
            font-size: clamp(24px, 8vw, 32px);
            text-align: center; 
            text-transform: uppercase; 
            background: linear-gradient(180deg, #000000 0%, #666666 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .dot-row { 
            margin-top: 20px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; background: #212121; }
        .dot.active { width: 16px; height: 16px; background: var(--accent-yellow); }

        .yellow-card { 
            width: 100%; 
            max-width: 380px;
            height: 210px; 
            margin-top: 30px;
            background: var(--accent-yellow); 
            border-radius: 25px; 
            padding: 30px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            gap: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .question { font-weight: 600; font-size: 16px; color: #000; text-align: center; }

        .upload-btn { 
            width: 100%; 
            height: 60px; 
            background: #000; 
            border-radius: 15px; 
            color: #FFF; 
            font-weight: 600; 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: background 0.2s;
        }
        
        .upload-btn:active { opacity: 0.8; }

        .action-btn { 
            margin-top: 40px;
            width: 180px; 
            height: 48px; 
            background: var(--black-grad); 
            border-radius: 25px; 
            border: none; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-text { color: #FFF; font-weight: 800; font-size: 18px; text-transform: uppercase; }

        .bottom-logo { 
            position: absolute;
            bottom: 30px;
            width: 110px;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">ОТДЕЛ ЗАБОТЫ</h1>
        
        <div class="dot-row">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot active"></div>
        </div>

        <div class="yellow-card">
            <p class="question">Прикрепите фото самого товара:</p>
            <div class="upload-btn" onclick="document.getElementById('f').click()" id="ut">СДЕЛАТЬ ФОТО</div>
            <input type="file" id="f" accept="image/*" capture="camera" style="display:none" onchange="fileReady()">
        </div>

        <button class="action-btn" onclick="finish()">
            <span class="btn-text">ЗАВЕРШТЬ</span>
        </button>

        <img src="../assets/images/spraystorelogo.png" class="bottom-logo">
    </div>

    <script>
        const tg = window.Telegram.WebApp; 
        tg.ready();
        tg.expand();

        tg.setHeaderColor('#FFFFFF');
        tg.setBackgroundColor('#FFFFFF');

        tg.BackButton.show();
        tg.BackButton.onClick(() => { 
            window.history.back(); 
        });

        function fileReady() {
            const input = document.getElementById('f');
            const btn = document.getElementById('ut');
            if (input.files && input.files[0]) {
                btn.innerText = 'ГОТОВО';
                btn.style.background = '#22c55e'; // ндикация успеха
            }
        }

        function finish() {
            const input = document.getElementById('f');
            if(!input.files[0]) {
                tg.showAlert("Пожалуйста, сделайте фото товара для завершения проверки!");
                return;
            }

            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
            
            // Финальный переход на рулетку
            window.location.href = 'roulette.html';
        }

        // Блокировка лишних движений экрана
        document.body.addEventListener('touchmove', function(e) {
            if (e.target.tagName !== 'INPUT') e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
