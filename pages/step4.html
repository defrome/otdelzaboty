ÔĽŅ<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>–†–Ā–†¬į–†—Ė 4 - –†¬§–†—ē–°‚Äö–†—ē –°‚Äö–†—ē–†–Ü–†¬į–°–ā–†¬į</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent-yellow: #FFBE00; 
            --black-grad: linear-gradient(180deg, #000000 0%, #1C1C1A 100%); 
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body, html { 
            width: 100%; 
            height: 100%; 
            background: #FFFFFF; 
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden;
        }

        .container { 
            width: 100%; 
            max-width: 500px;
            height: 100vh; 
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        .main-title { 
            margin-top: 10px;
            font-weight: 800; 
            font-size: clamp(24px, 8vw, 32px);
            text-align: center; 
            text-transform: uppercase; 
            background: linear-gradient(180deg, #000000 0%, #666666 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .dot-row { 
            margin-top: 20px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; background: #212121; }
        .dot.active { width: 16px; height: 16px; background: var(--accent-yellow); }

        .yellow-card { 
            width: 100%; 
            max-width: 380px;
            height: 210px; 
            margin-top: 30px;
            background: var(--accent-yellow); 
            border-radius: 25px; 
            padding: 30px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            gap: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .question { font-weight: 600; font-size: 16px; color: #000; text-align: center; }

        .upload-btn { 
            width: 100%; 
            height: 60px; 
            background: #000; 
            border-radius: 15px; 
            color: #FFF; 
            font-weight: 600; 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: background 0.2s;
        }
        
        .upload-btn:active { opacity: 0.8; }

        .action-btn { 
            margin-top: 40px;
            width: 180px; 
            height: 48px; 
            background: var(--black-grad); 
            border-radius: 25px; 
            border: none; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-text { color: #FFF; font-weight: 800; font-size: 18px; text-transform: uppercase; }

        .bottom-logo { 
            position: absolute;
            bottom: 30px;
            width: 110px;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">–†—õ–†—ě–†‚ÄĚ–†‚ÄĘ–†‚Äļ –†‚ÄĒ–†—í–†‚Äė–†—õ–†—ě–†¬ę</h1>
        
        <div class="dot-row">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot active"></div>
        </div>

        <div class="yellow-card">
            <p class="question">–†—ü–°–ā–†—Ď–†—Ē–°–ā–†¬Ķ–†—ó–†—Ď–°‚Äö–†¬Ķ –°‚Äě–†—ē–°‚Äö–†—ē –°–É–†¬į–†—ė–†—ē–†—Ė–†—ē –°‚Äö–†—ē–†–Ü–†¬į–°–ā–†¬į:</p>
            <div class="upload-btn" onclick="document.getElementById('f').click()" id="ut">–†–é–†‚ÄĚ–†‚ÄĘ–†‚Äļ–†—í–†—ě–†¬¨ –†¬§–†—õ–†—ě–†—õ</div>
            <input type="file" id="f" accept="image/*" capture="camera" style="display:none" onchange="fileReady()">
        </div>

        <button class="action-btn" onclick="finish()">
            <span class="btn-text">–†‚ÄĒ–†—í–†‚Äô–†‚ÄĘ–†¬†–†–Ā–†¬ė–†—ě–†¬¨</span>
        </button>

        <img src="../assets/images/spraystorelogo.png" class="bottom-logo">
    </div>

    <script>
        const tg = window.Telegram.WebApp; 
        tg.ready();
        tg.expand();

        tg.setHeaderColor('#FFFFFF');
        tg.setBackgroundColor('#FFFFFF');

        tg.BackButton.show();
        tg.BackButton.onClick(() => { 
            window.history.back(); 
        });

        function fileReady() {
            const input = document.getElementById('f');
            const btn = document.getElementById('ut');
            if (input.files && input.files[0]) {
                btn.innerText = '–†‚Äú–†—õ–†—ě–†—õ–†‚Äô–†—õ';
                btn.style.background = '#22c55e'; // –†¬ė–†–Ö–†“Ď–†—Ď–†—Ē–†¬į–°‚Ä†–†—Ď–°–Ź –°—ď–°–É–†—ó–†¬Ķ–°‚Ä¶–†¬į
            }
        }

        function finish() {
            const input = document.getElementById('f');
            if(!input.files[0]) {
                tg.showAlert("–†—ü–†—ē–†¬∂–†¬į–†¬Ľ–°—ď–†‚ĄĖ–°–É–°‚Äö–†¬į, –°–É–†“Ď–†¬Ķ–†¬Ľ–†¬į–†‚ĄĖ–°‚Äö–†¬Ķ –°‚Äě–†—ē–°‚Äö–†—ē –°‚Äö–†—ē–†–Ü–†¬į–°–ā–†¬į –†“Ď–†¬Ľ–°–Ź –†¬∑–†¬į–†–Ü–†¬Ķ–°–ā–°‚ā¨–†¬Ķ–†–Ö–†—Ď–°–Ź –†—ó–°–ā–†—ē–†–Ü–†¬Ķ–°–ā–†—Ē–†—Ď!");
                return;
            }

            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
            
            // –†¬§–†—Ď–†–Ö–†¬į–†¬Ľ–°–ä–†–Ö–°‚ÄĻ–†‚ĄĖ –†—ó–†¬Ķ–°–ā–†¬Ķ–°‚Ä¶–†—ē–†“Ď –†–Ö–†¬į –°–ā–°—ď–†¬Ľ–†¬Ķ–°‚Äö–†—Ē–°—ď
            window.location.href = 'roulette.html';
        }

        // –†‚Äė–†¬Ľ–†—ē–†—Ē–†—Ď–°–ā–†—ē–†–Ü–†—Ē–†¬į –†¬Ľ–†—Ď–°‚ā¨–†–Ö–†—Ď–°‚Ä¶ –†“Ď–†–Ü–†—Ď–†¬∂–†¬Ķ–†–Ö–†—Ď–†‚ĄĖ –°–Ć–†—Ē–°–ā–†¬į–†–Ö–†¬į
        document.body.addEventListener('touchmove', function(e) {
            if (e.target.tagName !== 'INPUT') e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
