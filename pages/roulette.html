<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tecmaster - Рулетка</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: linear-gradient(180deg, #E8E8E8 0%, #C3C3C3 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            line-height: 100%;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #E8E8E8;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        .main-container {
            width: 422px; 
            min-width: 422px;
            height: 100vh;
            background: var(--bg-main);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        /* ЗАГОЛОВОК */
        .title-roulette {
            position: absolute;
            width: 359px;
            height: 49px;
            top: 39px;
            left: 32px;
            font-weight: 800;
            font-size: 40px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #000000 0%, #666666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ПОДЗАГОЛОВОК */
        .subtitle-roulette {
            position: absolute;
            width: 212px;
            height: 18px;
            top: 88px;
            left: 105px;
            font-weight: 300;
            font-size: 15px;
            color: #000000;
        }

        /* СТРЕЛКА: Polygon 1 (image_2768c0.png) */
        .polygon-1 {
            position: absolute;
            width: 22px;
            height: 30px;
            top: 122px;
            left: 200px;
            background-color: #EA0000;
            /* Создаем форму треугольника через clip-path */
            clip-path: polygon(50% 100%, 0% 0%, 100% 0%);
            z-index: 5;
            /* Rotation -180° в Figma означает, что острие смотрит вниз */
        }

        /* ELLIPSE 1: Барабан */
        .ellipse-1 {
            position: absolute;
            width: 301px;
            height: 301px;
            top: 139px;
            left: 61px;
            background: linear-gradient(180deg, #1C1C1A 0%, #000000 100%);
            border: 1px solid #FAC303;
            border-radius: 50%;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            overflow: hidden;
        }

        /* ЛН */
        .line {
            position: absolute;
            width: 301px;
            height: 0px;
            border-top: 1px solid;
            top: 150px;
            left: 0;
            transform-origin: center;
        }
        .line-1 { border-color: #FCC300; transform: rotate(90deg); }
        .line-2 { border-color: #FAC303; transform: rotate(0deg); }
        .line-3 { border-color: #FAC303; transform: rotate(45deg); }
        .line-4 { border-color: #FCC300; transform: rotate(135deg); }

        /* ПРЗЫ */
        .prize-text {
            position: absolute;
            width: 100px;
            height: 29px;
            left: 100px;
            top: 35px;
            font-weight: 400;
            font-size: 24px;
            color: #FFFFFF;
            text-align: center;
            transform-origin: 50% 115px;
        }
        .p1 { transform: rotate(22.5deg); }
        .p2 { transform: rotate(67.5deg); }
        .p3 { transform: rotate(112.5deg); }
        .p4 { transform: rotate(157.5deg); }
        .p5 { transform: rotate(202.5deg); }
        .p6 { transform: rotate(247.5deg); }
        .p7 { transform: rotate(292.5deg); }
        .p8 { transform: rotate(337.5deg); }

        /* КНОПКА: Rectangle 3 */
        .rectangle-3 {
            position: absolute;
            width: 176px;
            height: 44px;
            top: 466px;
            left: 123px;
            background: linear-gradient(180deg, #000000 0%, #1C1C1A 100%);
            border-radius: 25px;
            box-shadow: 0px 0px 20px 4px rgba(0, 0, 0, 0.25);
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-text-spin {
            font-weight: 800;
            font-size: 24px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #FFFFFF 0%, #999999 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bottom-logo {
            position: absolute;
            width: 104px;
            height: 45px;
            bottom: 40px; 
            left: 159px;
        }
    </style>
</head>
<body>

    <main class="main-container">
        <div class="title-roulette">КРУТ РУЛЕТКУ</div>
        <div class="subtitle-roulette"> выбивай лучшие скидки!</div>

        <div class="polygon-1"></div>

        <div class="ellipse-1" id="wheel">
            <div class="line line-1"></div>
            <div class="line line-2"></div>
            <div class="line line-3"></div>
            <div class="line line-4"></div>

            <div class="prize-text p1">5%</div>
            <div class="prize-text p2">10%</div>
            <div class="prize-text p3">15%</div>
            <div class="prize-text p4">20%</div>
            <div class="prize-text p5">25%</div>
            <div class="prize-text p6">30%</div>
            <div class="prize-text p7">50%</div>
            <div class="prize-text p8">100%</div>
        </div>

        <button class="rectangle-3" id="spin_btn">
            <span class="btn-text-spin">КРУТТЬ</span>
        </button>

        <img src="../assets/images/spraystorelogo.png" class="bottom-logo">
    </main>

    <script>
        const tg = window.Telegram.WebApp;
        const API_BASE = sessionStorage.getItem('api_base') || window.__API_BASE__ || 'http://127.0.0.1:8000/api/v1';
        const DISCOUNTS = [5, 10, 15, 20, 25, 30, 50, 100];
        
        // нициализация интерфейса
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#E8E8E8');
        tg.setBackgroundColor('#E8E8E8');

        // --- ЛОГКА КНОПК НАЗАД ---
        tg.BackButton.show(); // Показываем кнопку в верхней панели
        tg.BackButton.onClick(() => {
            // Перед переходом скрываем кнопку (хороший тон)
            tg.BackButton.hide();
            // Укажите имя вашего главного файла (index.html или main.html)
            window.location.href = '../index.html'; 
        });

        // --- ЛОГКА РУЛЕТК ---
        const wheel = document.getElementById('wheel');
        const btn = document.getElementById('spin_btn');
        let currentRotation = 0;
        let isSpinning = false;

        btn.addEventListener('click', async () => {
            if (isSpinning) return; // Не даем крутить, пока идет анимация

            isSpinning = true;
            btn.style.opacity = "0.5"; // Визуально отключаем кнопку
            btn.style.pointerEvents = "none";

            // Виброотклик
            tg.HapticFeedback.impactOccurred('heavy');

            try {
                const applicationId = sessionStorage.getItem('application_id');
                const response = await fetch(`${API_BASE}/roulette/spin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ application_id: applicationId })
                });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const payload = await response.json();
                const discount = payload.discount_percent;
                const index = DISCOUNTS.indexOf(discount);
                const sectorCenter = 22.5 + (index < 0 ? 0 : index * 45);
                const targetOffset = (360 - sectorCenter) % 360;
                const turnDegree = 1800 + targetOffset;
                currentRotation += turnDegree;

                wheel.style.transform = `rotate(${currentRotation}deg)`;

                setTimeout(() => {
                    isSpinning = false;
                    tg.HapticFeedback.notificationOccurred('success');
                    tg.showAlert(`Ваша скидка: ${discount}%`);
                    btn.style.opacity = "1";
                    btn.style.pointerEvents = "auto";
                }, 4000);
            } catch (error) {
                console.error(error);
                isSpinning = false;
                btn.style.opacity = "1";
                btn.style.pointerEvents = "auto";
                tg.showAlert("Не удалось выполнить розыгрыш. Попробуйте снова.");
            }
        });
    </script>
</body>
</html>
