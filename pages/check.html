<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Шаг 1 - Маркетплейс</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent-yellow: #FFBE00; --btn-grad: linear-gradient(180deg, #FFD250 0%, #FFC20F 100%); --black-grad: linear-gradient(180deg, #000000 0%, #1C1C1A 100%); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { width: 100%; height: 100vh; background: #FFFFFF; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; overflow: hidden; }
        .container { width: 422px; position: relative; height: 100%; flex-shrink: 0; }
        .main-title { position: absolute; width: 100%; top: 30px; font-weight: 800; font-size: 32px; text-align: center; text-transform: uppercase; background: linear-gradient(180deg, #000000 0%, #666666 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .dot-row { position: absolute; top: 120px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #212121; }
        .dot.active { width: 16px; height: 16px; background: var(--accent-yellow); }
        .yellow-card { position: absolute; width: 368px; height: 210px; top: 155px; left: 27px; background: var(--accent-yellow); border-radius: 25px; padding: 20px; display: flex; flex-direction: column; }
        .question { font-weight: 600; font-size: 15px; margin-bottom: 15px; text-align: center; color: #000; }
        .market-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .m-btn { height: 53px; background: var(--btn-grad); border-radius: 25px; border: none; box-shadow: 0 4px 4px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.1s; }
        .m-btn.selected { outline: 3px solid #000; transform: scale(0.95); }
        .m-btn img { max-width: 80%; max-height: 60%; object-fit: contain; pointer-events: none; }
        .action-btn { position: absolute; width: 176px; height: 44px; top: 480px; left: 123px; background: var(--black-grad); border-radius: 25px; border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.3); cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .btn-text { color: #FFF; font-weight: 800; font-size: 20px; text-transform: uppercase; }
        .bottom-logo { position: absolute; width: 104px; bottom: 40px; left: 159px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">ОТДЕЛ ЗАБОТЫ</h1>
        <div class="dot-row"><div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="yellow-card">
            <p class="question">Где вы совершили покупку?</p>
            <div class="market-grid">
                <button class="m-btn" data-market="wb" onclick="selectMarket(this)"><img src="../assets/images/wb_logo.png"></button>
                <button class="m-btn" data-market="ozon" onclick="selectMarket(this)"><img src="../assets/images/ozon_logo.png"></button>
                <button class="m-btn" data-market="yandex" onclick="selectMarket(this)"><img src="../assets/images/yandex_logo.png"></button>
                <button class="m-btn" data-market="lemana" onclick="selectMarket(this)"><img src="../assets/images/lemana_logo.png"></button>
                <button class="m-btn" data-market="bau" onclick="selectMarket(this)"><img src="../assets/images/bau_logo.png"></button>
                <button class="m-btn" data-market="petr" onclick="selectMarket(this)"><img src="../assets/images/petr_logo.png"></button>
            </div>
        </div>
        <button class="action-btn" onclick="goNext()">
            <span class="btn-text">ДАЛЕЕ</span>
        </button>
        <img src="../assets/images/spraystorelogo.png" class="bottom-logo">
    </div>
    <script>
        const tg = window.Telegram.WebApp; tg.ready();
        const API_BASE = window.__API_BASE__ || 'http://127.0.0.1:8000/api/v1';
        let selectedMarketplace = sessionStorage.getItem('marketplace');

        if (selectedMarketplace) {
            const selected = document.querySelector(`.m-btn[data-market="${selectedMarketplace}"]`);
            if (selected) {
                selected.classList.add('selected');
            }
        }

        function selectMarket(btn) {
            document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedMarketplace = btn.dataset.market || null;
            if (selectedMarketplace) {
                sessionStorage.setItem('marketplace', selectedMarketplace);
            }
            tg.HapticFeedback.impactOccurred('light');
        }
        function goNext() {
            if (!selectedMarketplace) {
                tg.showAlert("Выберите маркетплейс");
                return;
            }
            sessionStorage.setItem('api_base', API_BASE);
            tg.HapticFeedback.impactOccurred('medium');
            window.location.href = 'step2.html';
        }
    </script>
</body>
</html>
