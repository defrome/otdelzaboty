<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Шаг 2 - Заказ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent-yellow: #FFBE00; 
            --black-grad: linear-gradient(180deg, #000000 0%, #1C1C1A 100%); 
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body, html { 
            width: 100%; 
            height: 100%; 
            background: #FFFFFF; 
            font-family: 'Montserrat', sans-serif; 
            /* Разрешаем скролл, если клавиатура съест место */
            overflow-x: hidden;
            overflow-y: auto; 
        }

        .container { 
            width: 100%; 
            max-width: 500px; 
            min-height: 100%; /* Занимает всю высоту */
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 20px 40px 20px; /* Отступ снизу для логотипа */
        }

        .main-title { 
            margin-top: 10px;
            font-weight: 800; 
            font-size: clamp(24px, 8vw, 32px); 
            text-align: center; 
            text-transform: uppercase; 
            background: linear-gradient(180deg, #000000 0%, #666666 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            flex-shrink: 0;
        }

        .dot-row { 
            margin-top: 20px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
            flex-shrink: 0;
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; background: #212121; }
        .dot.active { width: 16px; height: 16px; background: var(--accent-yellow); }

        .yellow-card { 
            width: 100%; 
            max-width: 380px;
            min-height: 210px; 
            margin-top: 30px;
            background: var(--accent-yellow); 
            border-radius: 25px; 
            padding: 30px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            gap: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        .question { font-weight: 600; font-size: 16px; color: #000; text-align: center; }

        .order-input { 
            width: 100%; 
            height: 55px; 
            background: rgba(255,255,255,0.5); 
            border: 2px solid #000; 
            border-radius: 15px; 
            padding: 0 15px; 
            font-size: 18px; 
            font-weight: 600; 
            text-align: center; 
            outline: none; 
            appearance: none;
        }

        .action-btn { 
            margin-top: 40px;
            width: 180px; 
            height: 48px; 
            background: var(--black-grad); 
            border-radius: 25px; 
            border: none; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s;
            flex-shrink: 0;
        }
        
        .action-btn:active { transform: scale(0.96); }
        .btn-text { color: #FFF; font-weight: 800; font-size: 18px; text-transform: uppercase; }

        /* Прослойка, которая выталкивает логотип вниз */
        .spacer {
            flex-grow: 1;
            min-height: 20px;
        }

        .bottom-logo { 
            width: 110px;
            height: auto;
            flex-shrink: 0;
            transition: opacity 0.3s, transform 0.3s;
        }

        /* Класс для скрытия логотипа */
        .hidden-logo {
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <h1 class="main-title">ОТДЕЛ ЗАБОТЫ</h1>
        
        <div class="dot-row">
            <div class="dot"></div>
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="yellow-card">
            <p class="question">Введите номер заказа:</p>
            <input type="text" class="order-input" placeholder="0000000000" id="orderNum" inputmode="numeric">
        </div>

        <button class="action-btn" onclick="checkOrder()">
            <span class="btn-text">ПРОВЕРТЬ</span>
        </button>

        <div class="spacer"></div>

        <img src="../assets/images/spraystorelogo.png" class="bottom-logo" id="bottomLogo">
    </div>

    <script>
        const tg = window.Telegram.WebApp; 
        const API_BASE = sessionStorage.getItem('api_base') || window.__API_BASE__ || 'https://dev.tgifts.space/api/v1';
        tg.ready(); 
        tg.expand(); 
        
        tg.setHeaderColor('#FFFFFF');
        tg.setBackgroundColor('#FFFFFF');

        const orderInput = document.getElementById('orderNum');
        const bottomLogo = document.getElementById('bottomLogo');

        // Скрываем логотип при наборе текста, чтобы не мешался
        orderInput.addEventListener('focus', () => {
            bottomLogo.classList.add('hidden-logo');
        });

        orderInput.addEventListener('blur', () => {
            bottomLogo.classList.remove('hidden-logo');
        });

        tg.BackButton.show();
        tg.BackButton.onClick(() => { 
            window.location.href = '../index.html'; 
        });

        async function checkOrder() {
            const val = orderInput.value;
            if(val.length < 5) {
                tg.showAlert("Введите корректный номер заказа!");
                return;
            }

            const marketplace = sessionStorage.getItem('marketplace');
            if (!marketplace) {
                tg.showAlert("Сначала выберите маркетплейс");
                window.location.href = 'check.html';
                return;
            }

            try {
                const tgUser = tg.initDataUnsafe?.user?.id || null;
                const response = await fetch(`${API_BASE}/applications`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        marketplace,
                        order_number: val,
                        telegram_user_id: tgUser
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const payload = await response.json();
                sessionStorage.setItem('application_id', payload.id);
                sessionStorage.setItem('order_number', val);

                tg.HapticFeedback.notificationOccurred('success');
                window.location.href = 'step3.html';
            } catch (error) {
                console.error(error);
                tg.showAlert("Ошибка сервера. Попробуйте еще раз.");
            }
        }

        // Закрытие клавиатуры при клике на пустую область
        document.getElementById('mainContainer').addEventListener('click', (e) => {
            if (e.target !== orderInput) {
                orderInput.blur();
            }
        });
    </script>
</body>
</html>
