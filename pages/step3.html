п»ҝ<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Р РҒР В°Р С– 3 - Р СӣРЎвҖҡР В·РЎвҖ№Р РҶ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent-yellow: #FFBE00; 
            --black-grad: linear-gradient(180deg, #000000 0%, #1C1C1A 100%); 
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body, html { 
            width: 100%; 
            height: 100%; 
            background: #FFFFFF; 
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden;
        }

        .container { 
            width: 100%; 
            max-width: 500px;
            height: 100vh; 
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        .main-title { 
            margin-top: 10px;
            font-weight: 800; 
            font-size: clamp(24px, 8vw, 32px);
            text-align: center; 
            text-transform: uppercase; 
            background: linear-gradient(180deg, #000000 0%, #666666 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .dot-row { 
            margin-top: 20px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; background: #212121; }
        .dot.active { width: 16px; height: 16px; background: var(--accent-yellow); }

        .yellow-card { 
            width: 100%; 
            max-width: 380px;
            height: 210px; 
            margin-top: 30px;
            background: var(--accent-yellow); 
            border-radius: 25px; 
            padding: 30px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            gap: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .question { font-weight: 600; font-size: 16px; color: #000; text-align: center; }

        .upload-btn { 
            width: 100%; 
            height: 60px; 
            background: #000; 
            border-radius: 15px; 
            color: #FFF; 
            font-weight: 600; 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: opacity 0.2s;
        }
        
        .upload-btn:active { opacity: 0.8; }

        .action-btn { 
            margin-top: 40px;
            width: 180px; 
            height: 48px; 
            background: var(--black-grad); 
            border-radius: 25px; 
            border: none; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-text { color: #FFF; font-weight: 800; font-size: 18px; text-transform: uppercase; }

        .bottom-logo { 
            position: absolute;
            bottom: 30px;
            width: 110px;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">Р СӣР СһР вҖқР вҖўР вҖә Р вҖ”Р С’Р вҖҳР СӣР СһР В«</h1>
        
        <div class="dot-row">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot active"></div>
            <div class="dot"></div>
        </div>

        <div class="yellow-card">
            <p class="question">Р СҹРЎРӮР С‘Р С”РЎРӮР ВөР С—Р С‘РЎвҖҡР Вө РЎРғР С”РЎРӮР С‘Р Р…РЎвӮ¬Р С•РЎвҖҡ Р С•РЎвҖҡР В·РЎвҖ№Р РҶР В°:</p>
            <div class="upload-btn" onclick="document.getElementById('f').click()" id="upText">Р вҖҷР В«Р вҖҳР В Р С’Р СһР В¬ Р РҺР СҷР В Р ВҳР СңР РҒР СӣР Сһ</div>
            <input type="file" id="f" style="display:none" onchange="fileSelected()">
        </div>

        <button class="action-btn" onclick="goNext()">
            <span class="btn-text">Р вҖқР С’Р вҖәР вҖўР вҖў</span>
        </button>

        <img src="../assets/images/spraystorelogo.png" class="bottom-logo">
    </div>

    <script>
        const tg = window.Telegram.WebApp; 
        tg.ready();
        tg.expand();

        tg.setHeaderColor('#FFFFFF');
        tg.setBackgroundColor('#FFFFFF');

        tg.BackButton.show();
        tg.BackButton.onClick(() => { 
            window.location.href = 'step2.html'; 
        });

        function fileSelected() {
            const input = document.getElementById('f');
            const btn = document.getElementById('upText');
            if (input.files && input.files[0]) {
                btn.innerText = 'Р ВӨР С’Р в„ўР вҖә Р вҖҷР В«Р вҖҳР В Р С’Р Сң';
                btn.style.background = '#22c55e'; // Р вҖ”Р ВөР В»Р ВөР Р…РЎвҖ№Р в„– РЎвҖ Р РҶР ВөРЎвҖҡ Р Т‘Р В»РЎРҸ Р С‘Р Р…Р Т‘Р С‘Р С”Р В°РЎвҖ Р С‘Р С‘ РЎС“РЎРғР С—Р ВөРЎвҖҰР В°
            }
        }

        function goNext() {
            if(!document.getElementById('f').files[0]) {
                tg.showAlert("Р СҹР С•Р В¶Р В°Р В»РЎС“Р в„–РЎРғРЎвҖҡР В°, Р РҶРЎвҖ№Р ВұР ВөРЎРӮР С‘РЎвҖҡР Вө РЎРғР С”РЎРӮР С‘Р Р…РЎвӮ¬Р С•РЎвҖҡ Р РҶР В°РЎвӮ¬Р ВөР С–Р С• Р С•РЎвҖҡР В·РЎвҖ№Р РҶР В°!");
                return;
            }
            tg.HapticFeedback.impactOccurred('medium');
            window.location.href = 'step4.html';
        }

        // Р вҖҳР В»Р С•Р С”Р С‘РЎРӮР С•Р РҶР С”Р В° Р В»Р С‘РЎвӮ¬Р Р…Р С‘РЎвҖҰ РЎРғР РҶР В°Р в„–Р С—Р С•Р РҶ
        document.body.addEventListener('touchmove', function(e) {
            if (e.target.tagName !== 'INPUT') e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
