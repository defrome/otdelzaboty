<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Шаг 4 - Фото</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent-yellow: #FFBE00; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100%; height: 100vh; background: #FFFFFF; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; }
        .container { width: 422px; position: relative; height: 100%; }
        .main-title { position: absolute; width: 100%; top: 30px; font-weight: 800; font-size: 32px; text-align: center; text-transform: uppercase; background: linear-gradient(180deg, #000000 0%, #666666 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .dot-row { position: absolute; top: 120px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #212121; }
        .dot.active { width: 16px; height: 16px; background: var(--accent-yellow); }
        .yellow-card { position: absolute; width: 368px; height: 210px; top: 155px; left: 27px; background: var(--accent-yellow); border-radius: 25px; padding: 35px 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .upload-btn { width: 100%; height: 60px; background: #000; border-radius: 15px; color: #FFF; font-weight: 600; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .action-btn { position: absolute; width: 176px; height: 44px; top: 480px; left: 123px; background: #000; border-radius: 25px; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .btn-text { color: #FFF; font-weight: 800; font-size: 18px; text-transform: uppercase; }
        .bottom-logo { position: absolute; width: 104px; bottom: 40px; left: 159px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">ОТДЕЛ ЗАБОТЫ</h1>
        <div class="dot-row"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot active"></div></div>
        <div class="yellow-card">
            <p style="font-weight:600">Прикрепите фото самого товара:</p>
            <div class="upload-btn" onclick="document.getElementById('f').click()" id="ut">СДЕЛАТЬ ФОТО</div>
            <input type="file" id="f" accept="image/*" capture="camera" style="display:none" onchange="document.getElementById('ut').innerText='ГОТОВО'">
        </div>
        <button class="action-btn" onclick="finish()"><span class="btn-text">ЗАВЕРШИТЬ</span></button>
        <img src="spraystorelogo.png" class="bottom-logo">
    </div>
    <script>
        const tg = window.Telegram.WebApp; tg.ready();
        function finish() {
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            // ФИНАЛЬНЫЙ ПЕРЕХОД НА РУЛЕТКУ
            window.location.href = 'roulette.html';
        }
    </script>
</body>
</html>
