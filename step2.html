<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Шаг 2 - Заказ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent-yellow: #FFBE00; 
            --black-grad: linear-gradient(180deg, #000000 0%, #1C1C1A 100%); 
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body, html { 
            width: 100%; 
            height: 100%; 
            background: #FFFFFF; 
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden; /* Запрещаем скролл самого окна */
        }

        /* Главный контейнер на весь экран */
        .container { 
            width: 100%; 
            max-width: 500px; /* Ограничение для десктопа, на мобилках будет 100% */
            height: 100vh; 
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        .main-title { 
            margin-top: 10px;
            font-weight: 800; 
            font-size: clamp(24px, 8vw, 32px); /* Адаптивный размер шрифта */
            text-align: center; 
            text-transform: uppercase; 
            background: linear-gradient(180deg, #000000 0%, #666666 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .dot-row { 
            margin-top: 20px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; background: #212121; }
        .dot.active { width: 16px; height: 16px; background: var(--accent-yellow); }

        /* Желтая карточка теперь резиновая по ширине */
        .yellow-card { 
            width: 100%; 
            max-width: 380px;
            height: 210px; 
            margin-top: 30px;
            background: var(--accent-yellow); 
            border-radius: 25px; 
            padding: 30px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            gap: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .question { font-weight: 600; font-size: 16px; color: #000; text-align: center; }

        .order-input { 
            width: 100%; 
            height: 55px; 
            background: rgba(255,255,255,0.5); 
            border: 2px solid #000; 
            border-radius: 15px; 
            padding: 0 15px; 
            font-size: 18px; 
            font-weight: 600; 
            text-align: center; 
            outline: none; 
            appearance: none;
        }

        /* Кнопка "ПРОВЕРИТЬ" */
        .action-btn { 
            margin-top: 40px;
            width: 180px; 
            height: 48px; 
            background: var(--black-grad); 
            border-radius: 25px; 
            border: none; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s;
        }
        
        .action-btn:active { transform: scale(0.96); }

        .btn-text { color: #FFF; font-weight: 800; font-size: 18px; text-transform: uppercase; }

        /* Логотип всегда прижат к низу */
        .bottom-logo { 
            position: absolute;
            bottom: 30px;
            width: 110px;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">ОТДЕЛ ЗАБОТЫ</h1>
        
        <div class="dot-row">
            <div class="dot"></div>
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="yellow-card">
            <p class="question">Введите номер заказа:</p>
            <input type="text" class="order-input" placeholder="0000000000" id="orderNum" inputmode="numeric">
        </div>

        <button class="action-btn" onclick="checkOrder()">
            <span class="btn-text">ПРОВЕРИТЬ</span>
        </button>

        <img src="spraystorelogo.png" class="bottom-logo">
    </div>

    <script>
        const tg = window.Telegram.WebApp; 
        tg.ready(); 
        tg.expand(); // Расширяем на весь экран
        
        // Настройка цветов темы для красоты
        tg.setHeaderColor('#FFFFFF');
        tg.setBackgroundColor('#FFFFFF');

        tg.BackButton.show();
        tg.BackButton.onClick(() => { 
            window.location.href = 'index.html'; 
        });

        function checkOrder() {
            const val = document.getElementById('orderNum').value;
            if(val.length < 5) {
                tg.showAlert("Введите корректный номер заказа!");
                return;
            }
            tg.HapticFeedback.notificationOccurred('success');
            window.location.href = 'step3.html';
        }

        // Фикс для iOS: предотвращаем "резиновый" скролл
        document.body.addEventListener('touchmove', function(e) {
            if (e.target.tagName !== 'INPUT') e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
